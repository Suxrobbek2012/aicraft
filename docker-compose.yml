version: '3.9'

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: goai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: goai
      POSTGRES_PASSWORD: goai_password
      POSTGRES_DB: goai_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U goai -d goai_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: goai_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: goai_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://goai:goai_password@postgres:5432/goai_db
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    ports:
      - '4000:4000'
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health/ready']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Web ─────────────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: goai_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_WS_URL: ws://api:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3010

    env_file:
      - .env
    ports:
      - '3010:3010'

  # ─── Ollama (Optional local AI) ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: goai_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - '11434:11434'
    profiles:
      - ollama

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  ollama_data:

networks:
  default:
    name: goai_network
