name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build shared package
        run: npm run build --workspace=@go-ai/shared

      - name: Build ai-core package
        run: npm run build --workspace=@go-ai/ai-core

      - name: Generate Prisma client & build database
        run: |
          cd packages/database && npx prisma generate
          npm run build --workspace=@go-ai/database

      - name: Type check API
        run: npx tsc --noEmit --project apps/api/tsconfig.json
        continue-on-error: true

      - name: Lint web
        run: npm run lint:web
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: cd packages/database && npx prisma generate

      - name: Build all packages
        run: npm run build
        continue-on-error: true
